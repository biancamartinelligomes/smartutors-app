<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Smartutors</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1C1C1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Smartutors">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F7F4EF;--warm-white:#FDFBF8;--charcoal:#1C1C1A;--mid:#4A4845;
  --muted:#9A968E;--forest:#1E3A2F;--gold:#B8965A;--gold-lt:#D4B07A;
  --border:#E0DBD2;--border-dark:rgba(255,255,255,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Jost',sans-serif;font-weight:300;background:var(--warm-white);color:var(--charcoal);min-height:100vh;-webkit-font-smoothing:antialiased;}
#loading{position:fixed;inset:0;background:var(--charcoal);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;z-index:999;transition:opacity 0.5s ease;}
.loading-wordmark{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:28px;letter-spacing:0.3em;text-transform:uppercase;color:var(--warm-white);}
.loading-bar{width:48px;height:0.5px;background:var(--gold);transform:scaleX(0);transform-origin:left;animation:barIn 1.2s ease 0.4s forwards;}
@keyframes barIn{to{transform:scaleX(1);}}
.app-header{background:var(--charcoal);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;border-bottom:0.5px solid var(--border-dark);}
.header-wordmark{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:16px;letter-spacing:0.25em;text-transform:uppercase;color:var(--warm-white);}
.header-user{margin-left:auto;display:flex;align-items:center;gap:10px;}
.user-monogram{width:28px;height:28px;border:0.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:0.05em;color:var(--gold);}
.user-name{font-size:10px;letter-spacing:0.08em;color:rgba(255,255,255,0.35);max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.admin-tag{font-size:7px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);border:0.5px solid rgba(184,150,90,0.35);padding:2px 7px;}
.logout-link{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.18);text-decoration:none;transition:color 0.2s;}
.logout-link:hover{color:rgba(255,255,255,0.5);}
.nav-tabs{background:var(--charcoal);border-bottom:0.5px solid var(--border-dark);display:flex;position:sticky;top:52px;z-index:40;}
.nav-tab{flex:1;padding:13px 8px;font-family:'Jost',sans-serif;font-size:8px;font-weight:400;letter-spacing:0.25em;text-transform:uppercase;color:rgba(255,255,255,0.22);background:none;border:none;cursor:pointer;border-bottom:0.5px solid transparent;transition:all 0.3s;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.main{padding:28px 18px 100px;max-width:680px;margin:0 auto;}
.section-label{font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:0.5px solid var(--border);}
.count-pill{font-size:9px;letter-spacing:0.12em;color:var(--gold);border:0.5px solid rgba(184,150,90,0.25);padding:2px 9px;}
.aula-card{background:var(--warm-white);border:0.5px solid var(--border);padding:18px 20px;margin-bottom:7px;border-left:1.5px solid transparent;transition:border-color 0.2s,transform 0.15s;animation:fadeUp 0.35s ease both;}
.aula-card:hover{transform:translateX(2px);}
.aula-card.pendente{border-left-color:var(--gold);}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.aula-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px;}
.aula-data{min-width:40px;text-align:center;border:0.5px solid var(--border);padding:7px 5px;}
.aula-dia{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;line-height:1;color:var(--charcoal);}
.aula-mes{font-size:7px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.aula-info{flex:1;}
.aula-titulo{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:16px;color:var(--charcoal);margin-bottom:3px;line-height:1.2;}
.aula-prof{font-size:10px;color:var(--muted);margin-bottom:2px;letter-spacing:0.03em;}
.aula-hora{font-size:10px;color:var(--muted);letter-spacing:0.03em;}
.aula-status{display:inline-flex;align-items:center;gap:5px;font-size:8px;letter-spacing:0.2em;text-transform:uppercase;padding:3px 9px;margin-top:9px;}
.status-pendente{background:rgba(184,150,90,0.07);color:var(--gold);border:0.5px solid rgba(184,150,90,0.2);}
.status-agendada{background:var(--cream);color:var(--muted);border:0.5px solid var(--border);}
.btn-feedback{width:100%;margin-top:12px;padding:11px 16px;background:var(--charcoal);color:var(--gold);font-family:'Jost',sans-serif;font-size:9px;font-weight:400;letter-spacing:0.22em;text-transform:uppercase;border:none;cursor:pointer;transition:background 0.2s;}
.btn-feedback:hover{background:var(--forest);}
.aula-waiting{font-size:10px;letter-spacing:0.08em;color:var(--muted);margin-top:10px;padding:9px 0;border-top:0.5px solid var(--border);}
.select-prof{width:100%;margin-top:10px;padding:8px 12px;font-family:'Jost',sans-serif;font-size:10px;background:var(--cream);color:var(--charcoal);border:0.5px solid var(--border);outline:none;}
.feedback-card{background:var(--warm-white);border:0.5px solid var(--border);padding:20px 22px;margin-bottom:7px;animation:fadeUp 0.35s ease both;}
.fb-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px;}
.fb-monogram{width:30px;height:30px;flex-shrink:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gold);}
.fb-meta{flex:1;}
.fb-prof{font-size:11px;letter-spacing:0.04em;color:var(--charcoal);}
.fb-date{font-size:9px;color:var(--muted);letter-spacing:0.04em;margin-top:2px;}
.fb-aluno{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.fb-divider{height:0.5px;background:var(--border);margin-bottom:10px;}
.fb-text{font-size:13px;line-height:1.8;color:var(--mid);}
.fb-img{width:100%;max-height:200px;object-fit:cover;margin-top:12px;cursor:pointer;border:0.5px solid var(--border);}
.btn-confirmar{width:100%;margin-top:14px;padding:10px 16px;background:transparent;color:var(--forest);font-family:'Jost',sans-serif;font-size:9px;font-weight:400;letter-spacing:0.2em;text-transform:uppercase;border:0.5px solid rgba(30,58,47,0.35);cursor:pointer;transition:all 0.2s;}
.btn-confirmar:hover{background:var(--forest);color:var(--warm-white);border-color:var(--forest);}
.btn-confirmar:disabled{opacity:0.4;cursor:default;}
.empty-state{padding:72px 20px;text-align:center;}
.empty-bar{width:28px;height:0.5px;background:var(--border);margin:0 auto 20px;}
.empty-text{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);line-height:2.2;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(28,28,26,0.8);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--warm-white);padding:28px 20px 44px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;border-top:1.5px solid var(--gold);animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:28px;height:0.5px;background:var(--border);margin:0 auto 24px;}
.modal-eyebrow{font-size:8px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.modal-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:22px;color:var(--charcoal);margin-bottom:4px;line-height:1.2;}
.modal-sub{font-size:10px;color:var(--muted);letter-spacing:0.05em;margin-bottom:24px;padding-bottom:18px;border-bottom:0.5px solid var(--border);}
.form-label{display:block;font-size:8px;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.form-input,.form-textarea{width:100%;padding:11px 13px;font-family:'Jost',sans-serif;font-size:13px;font-weight:300;background:var(--cream);color:var(--charcoal);border:0.5px solid var(--border);outline:none;transition:border-color 0.2s;}
.form-input:focus,.form-textarea:focus{border-color:var(--charcoal);background:var(--warm-white);}
.form-textarea{resize:vertical;min-height:110px;line-height:1.7;}
.form-group{margin-bottom:18px;}
.voice-row{display:flex;gap:8px;}
.voice-row .form-textarea{flex:1;}
.btn-voice{width:42px;height:42px;flex-shrink:0;align-self:flex-end;background:var(--charcoal);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background 0.2s;}
.btn-voice:hover{background:var(--forest);}
.btn-voice.gravando{background:rgba(160,50,50,0.85);animation:pulse 1s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.upload-area{border:0.5px dashed var(--border);padding:22px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;}
.upload-area:hover{border-color:var(--charcoal);background:var(--cream);}
.upload-area.tem-img{border-style:solid;border-color:var(--forest);}
.upload-icon{font-size:1.4rem;margin-bottom:5px;}
.upload-text{font-size:10px;letter-spacing:0.1em;color:var(--muted);}
.upload-preview{width:100%;max-height:150px;object-fit:cover;margin-top:10px;display:none;}
#file-input{display:none;}
.btn-salvar{width:100%;padding:14px;background:var(--charcoal);color:var(--gold);font-family:'Jost',sans-serif;font-size:9px;font-weight:400;letter-spacing:0.25em;text-transform:uppercase;border:none;cursor:pointer;transition:background 0.2s;margin-top:8px;}
.btn-salvar:hover{background:var(--forest);}
.btn-salvar:disabled{opacity:0.5;cursor:default;}
.btn-cancelar{width:100%;padding:12px;background:none;color:var(--muted);font-family:'Jost',sans-serif;font-size:9px;font-weight:400;letter-spacing:0.2em;text-transform:uppercase;border:0.5px solid var(--border);cursor:pointer;margin-top:7px;transition:all 0.2s;}
.btn-cancelar:hover{border-color:var(--mid);color:var(--mid);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--charcoal);color:var(--warm-white);font-size:9px;letter-spacing:0.15em;text-transform:uppercase;padding:11px 22px;z-index:500;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s;opacity:0;white-space:nowrap;border-bottom:1.5px solid transparent;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{border-bottom-color:var(--gold);}
.toast.erro{background:rgba(130,35,35,0.95);}
@media(min-width:600px){.modal{border-top:none;border:1.5px solid var(--gold);margin-bottom:24px;}.modal-overlay{align-items:center;}.main{padding:36px 28px 80px;}}
</style>
</head>
<body>
<div id="loading"><div class="loading-wordmark">Smartutors</div><div class="loading-bar"></div></div>
<div id="app" style="display:none;">
  <header class="app-header">
    <div class="header-wordmark">Smartutors</div>
    <div class="header-user">
      <div class="user-monogram" id="userMonogram">?</div>
      <div>
        <div class="user-name" id="userName">...</div>
        <div class="admin-tag" id="adminTag" style="display:none;">Admin</div>
      </div>
      <a class="logout-link" href="/auth/logout">Sair</a>
    </div>
  </header>
  <nav class="nav-tabs">
    <button class="nav-tab active" data-tab="agenda" onclick="switchTab('agenda')">Pendentes</button>
    <button class="nav-tab" data-tab="feedbacks" onclick="switchTab('feedbacks')">Enviados</button>
  </nav>
  <div class="main">
    <div id="tab-agenda">
      <div class="section-label">Aguardando feedback<span class="count-pill" id="countAulas">0</span></div>
      <div id="listaAulas"><div class="empty-state"><div class="loading-bar" style="margin:0 auto;animation:barIn 1.5s ease infinite alternate;"></div></div></div>
    </div>
    <div id="tab-feedbacks" style="display:none;">
      <div class="section-label">Feedbacks enviados<span class="count-pill" id="countFeedbacks">0</span></div>
      <div id="listaFeedbacks"><div class="empty-state"><div class="loading-bar" style="margin:0 auto;animation:barIn 1.5s ease infinite alternate;"></div></div></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modalOverlay" onclick="fecharModalSeFora(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-eyebrow">Registrar Feedback</div>
    <div class="modal-title" id="modalTitulo">Aula</div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="form-group"><label class="form-label">Nome do Aluno</label><input class="form-input" type="text" id="inputAluno" placeholder="Nome completo"></div>
    <div class="form-group"><label class="form-label">Feedback da Aula</label><div class="voice-row"><textarea class="form-textarea" id="inputFeedback" placeholder="Descreva o desempenho e progresso do aluno..."></textarea><button class="btn-voice" id="btnVoz" onclick="toggleVoz()">🎙️</button></div></div>
    <div class="form-group"><label class="form-label">Imagem (opcional)</label><div class="upload-area" id="uploadArea" onclick="document.getElementById('file-input').click()"><div class="upload-icon">📷</div><div class="upload-text">Adicionar foto</div><img class="upload-preview" id="uploadPreview" src="" alt=""></div><input type="file" id="file-input" accept="image/*" capture="environment" onchange="previewImagem(event)"></div>
    <button class="btn-salvar" id="btnSalvar" onclick="salvarFeedback()">Salvar Feedback</button>
    <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var usuario=null,aulaAtual=null,aulas=[],imagemFile=null,recognition=null,gravando=false;
var MESES=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
window.onload=function(){
  fetch('/api/me').then(function(r){return r.json();}).then(function(u){
    if(u.erro){window.location='/';return;}
    usuario=u;
    var ini=u.nome.split(' ').map(function(n){return n[0];}).join('').substring(0,2).toUpperCase();
    document.getElementById('userMonogram').textContent=ini;
    document.getElementById('userName').textContent=u.nome||u.email;
    if(u.perfil==='admin')document.getElementById('adminTag').style.display='block';
    var el=document.getElementById('loading');el.style.opacity='0';
    setTimeout(function(){el.style.display='none';document.getElementById('app').style.display='block';},500);
    carregarAulas();carregarFeedbacks();
  }).catch(function(){window.location='/';});
};
function switchTab(tab){
  ['agenda','feedbacks'].forEach(function(t){
    document.getElementById('tab-'+t).style.display=t===tab?'block':'none';
    document.querySelector('[data-tab="'+t+'"]').classList.toggle('active',t===tab);
  });
}
function carregarAulas(){fetch('/api/aulas').then(function(r){return r.json();}).then(renderAulas).catch(function(){mostrarToast('Erro ao carregar aulas','erro');});}
function renderAulas(lista){
  aulas=lista;document.getElementById('countAulas').textContent=lista.length;
  var c=document.getElementById('listaAulas');
  if(!lista.length){c.innerHTML='<div class="empty-state"><div class="empty-bar"></div><div class="empty-text">Nenhuma aula pendente<br>Todos os feedbacks foram enviados</div></div>';return;}
  c.innerHTML='';
  lista.forEach(function(aula,idx){
    var p=aula.data.split('/'),dia=p[0]||'--',mes=MESES[parseInt(p[1]||'1')-1]||'';
    var disp=aula.feedbackDisponivel;
    var sHtml=disp?'<div class="aula-status status-pendente">● Aguardando feedback</div>':'<div class="aula-status status-agendada">◌ Inicia às '+aula.horaInicio+'</div>';
    var btnF=disp?'<button class="btn-feedback" onclick="abrirModal('+idx+')">Registrar Feedback →</button>':'<div class="aula-waiting">Disponível a partir das '+aula.horaInicio+'</div>';
    var profH=usuario.perfil==='admin'?'<div class="aula-prof">'+(aula.professor||'Não atribuído')+'</div>':'';
    var atrH='';
    if(usuario.perfil==='admin'&&!aula.professor){atrH='<select class="select-prof" data-id="'+aula.id+'" onchange="atribuirProf(this)"><option value="">— Atribuir professor —</option></select>';}
    var card=document.createElement('div');
    card.className='aula-card'+(disp?' pendente':'');card.style.animationDelay=(idx*.05)+'s';
    card.innerHTML='<div class="aula-head"><div class="aula-data"><div class="aula-dia">'+dia+'</div><div class="aula-mes">'+mes+'</div></div><div class="aula-info"><div class="aula-titulo">'+aula.titulo+'</div>'+profH+'<div class="aula-hora">'+aula.horaInicio+' – '+aula.horaFim+'</div></div></div>'+sHtml+atrH+btnF;
    c.appendChild(card);
    if(atrH){var sel=card.querySelector('.select-prof');fetch('/api/professores').then(function(r){return r.json();}).then(function(l){l.forEach(function(p){var o=document.createElement('option');o.value=p.email;o.textContent=p.nome;sel.appendChild(o);});});}
  });
}
function atribuirProf(sel){if(!sel.value)return;fetch('/api/aulas/'+sel.dataset.id+'/professor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:sel.value})}).then(function(){mostrarToast('Professor atribuído','ok');carregarAulas();});}
function carregarFeedbacks(){fetch('/api/feedbacks').then(function(r){return r.json();}).then(renderFeedbacks);}
function renderFeedbacks(lista){
  document.getElementById('countFeedbacks').textContent=lista.length;
  var c=document.getElementById('listaFeedbacks');
  if(!lista.length){c.innerHTML='<div class="empty-state"><div class="empty-bar"></div><div class="empty-text">Nenhum feedback pendente<br>de confirmação</div></div>';return;}
  c.innerHTML='';
  lista.forEach(function(fb,idx){
    var ini=fb.professor.split('@')[0].substring(0,2).toUpperCase();
    var imgH=fb.imagemUrl?'<img class="fb-img" src="'+fb.imagemUrl+'" onclick="window.open(this.src)">':'';
    var btnConfirmar=usuario.perfil==='admin'?'<button class="btn-confirmar" onclick="confirmarFeedback('+fb.id+',this)">✓ Confirmar e arquivar</button>':'';
    var card=document.createElement('div');card.className='feedback-card';card.style.animationDelay=(idx*.05)+'s';
    card.innerHTML='<div class="fb-header"><div class="fb-monogram">'+ini+'</div><div class="fb-meta"><div class="fb-prof">'+fb.professor+'</div><div class="fb-date">'+fb.timestamp+'</div></div></div><div class="fb-aluno">'+fb.aluno+'</div><div class="fb-divider"></div><div class="fb-text">'+fb.feedback+'</div>'+imgH+btnConfirmar;
    c.appendChild(card);
  });
}
function confirmarFeedback(id,btn){
  btn.disabled=true;btn.textContent='Arquivando...';
  fetch('/api/feedbacks/'+id+'/confirmar',{method:'POST'}).then(function(r){return r.json();}).then(function(){mostrarToast('Feedback arquivado','ok');carregarFeedbacks();}).catch(function(){btn.disabled=false;btn.textContent='✓ Confirmar e arquivar';mostrarToast('Erro ao confirmar','erro');});
}
function abrirModal(idx){
  aulaAtual=aulas[idx];
  document.getElementById('modalTitulo').textContent=aulaAtual.titulo;
  document.getElementById('modalSub').textContent=aulaAtual.data+' · '+aulaAtual.horaInicio+' – '+aulaAtual.horaFim;
  document.getElementById('inputAluno').value='';document.getElementById('inputFeedback').value='';
  document.getElementById('uploadPreview').style.display='none';
  document.getElementById('uploadArea').classList.remove('tem-img');
  document.getElementById('uploadArea').querySelector('.upload-icon').style.display='block';
  document.getElementById('uploadArea').querySelector('.upload-text').textContent='Adicionar foto';
  imagemFile=null;document.getElementById('modalOverlay').classList.add('open');document.body.style.overflow='hidden';
}
function fecharModal(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';if(gravando)pararVoz();}
function fecharModalSeFora(e){if(e.target===document.getElementById('modalOverlay'))fecharModal();}
function toggleVoz(){if(gravando)pararVoz();else iniciarVoz();}
function iniciarVoz(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){mostrarToast('Voz não suportada','erro');return;}
  recognition=new SR();recognition.lang='pt-BR';recognition.continuous=true;recognition.interimResults=true;
  var prev=document.getElementById('inputFeedback').value;
  recognition.onresult=function(e){var t='';for(var i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;document.getElementById('inputFeedback').value=prev+t;};
  recognition.onend=function(){pararVoz();};recognition.start();gravando=true;
  document.getElementById('btnVoz').classList.add('gravando');document.getElementById('btnVoz').textContent='⏹';mostrarToast('Gravando...');
}
function pararVoz(){if(recognition){try{recognition.stop();}catch(e){}}recognition=null;gravando=false;document.getElementById('btnVoz').classList.remove('gravando');document.getElementById('btnVoz').textContent='🎙️';}
function previewImagem(event){
  imagemFile=event.target.files[0];if(!imagemFile)return;
  var reader=new FileReader();
  reader.onload=function(e){var pv=document.getElementById('uploadPreview');pv.src=e.target.result;pv.style.display='block';document.getElementById('uploadArea').classList.add('tem-img');document.getElementById('uploadArea').querySelector('.upload-icon').style.display='none';document.getElementById('uploadArea').querySelector('.upload-text').textContent=imagemFile.name;};
  reader.readAsDataURL(imagemFile);
}
function salvarFeedback(){
  var aluno=document.getElementById('inputAluno').value.trim();
  var feedback=document.getElementById('inputFeedback').value.trim();
  if(!aluno){mostrarToast('Informe o nome do aluno','erro');return;}
  if(!feedback){mostrarToast('Escreva o feedback','erro');return;}
  var btn=document.getElementById('btnSalvar');btn.disabled=true;btn.textContent='Salvando...';
  function salvar(imgUrl){
    fetch('/api/feedbacks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({idAula:aulaAtual.id,aluno:aluno,dataAula:aulaAtual.data,feedback:feedback,imagemUrl:imgUrl||''})}).then(function(r){return r.json();}).then(function(){btn.disabled=false;btn.textContent='Salvar Feedback';fecharModal();mostrarToast('Feedback registrado','ok');carregarAulas();carregarFeedbacks();setTimeout(function(){switchTab('feedbacks');},800);}).catch(function(){btn.disabled=false;btn.textContent='Salvar Feedback';mostrarToast('Erro ao salvar','erro');});
  }
  if(imagemFile){var fd=new FormData();fd.append('imagem',imagemFile);fetch('/api/upload',{method:'POST',body:fd}).then(function(r){return r.json();}).then(function(r){salvar(r.url||'');}).catch(function(){salvar('');});}else{salvar('');}
}
var tt=null;
function mostrarToast(msg,tipo){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(tipo?' '+tipo:'');if(tt)clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('show');},3000);}
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){});}
</script>
</body>
